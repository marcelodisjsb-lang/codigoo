const map = L.map("map").setView([-14.2, -51.9], 4);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

let markers = [];


function renderMapa(){

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  pontos.forEach(p => {

    const marker = L.marker([p.lat, p.lng])
      .addTo(map)
      .bindPopup(`
        <b>${p.nome}</b><br>
        <a href="${p.maps}" target="_blank">Abrir no Google Maps</a>
      `);

    markers.push(marker);

  });

}


function renderLocais(){

  const container = document.getElementById("lista-locais");
  container.innerHTML = "";

  pontos.forEach(p => {

    container.innerHTML += `
      <div class="card">

        <h3>${p.nome}</h3>

        <p>${p.cidade} - ${p.estado}</p>
        <p>${p.bairro}</p>
        <p>${p.endereco}</p>

        <p><strong>Coleta:</strong> ${p.coleta.join(", ")}</p>

        <a href="${p.maps}" target="_blank" class="mapButton">
          Ver no Google Maps
        </a>

      </div>
    `;

  });

}
